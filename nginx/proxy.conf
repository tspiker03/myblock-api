# nginx/proxy.conf
# ─────────────────────────────────────────────────────────
# Reverse proxy for the dev/staging Droplet.
# Routes:
#   api.my-block.app   → myblock-api container (port 3000)
#   admin.my-block.app → myblock-admin container (port 80)
#
# SSL termination is handled here; upstream containers run HTTP.
# Certs are provisioned by certbot and mounted read-only.
# ─────────────────────────────────────────────────────────

# Redirect all plain HTTP to HTTPS
server {
    listen 80;
    server_name api.my-block.app admin.my-block.app;

    # Allow certbot ACME webroot challenges through without redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── API subdomain ────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.my-block.app;

    ssl_certificate     /etc/letsencrypt/live/api.my-block.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.my-block.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Allow larger payloads for file uploads (e.g. profile photos)
    client_max_body_size 10M;

    location / {
        proxy_pass         http://myblock-api:3000;
        proxy_http_version 1.1;

        # Required for WebSocket (Socket.IO) support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ── Admin subdomain ──────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.my-block.app;

    ssl_certificate     /etc/letsencrypt/live/admin.my-block.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.my-block.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;

    location / {
        proxy_pass         http://myblock-admin:80;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
